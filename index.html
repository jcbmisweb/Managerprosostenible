    <!-- Global Error Handler -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.backgroundColor = '#fee2e2';
        errorDiv.style.color = '#991b1b';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '9999';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.borderBottom = '2px solid #7f1d1d';
        errorDiv.innerHTML = '<strong>Error de Aplicación:</strong><br/>' + message;
        document.body.appendChild(errorDiv);
        console.error("Global Catch:", error);
      };
    </script>

      /* ACADEMIC PRINT STYLES - OPTIMIZED */
      @media print {

        body { 
            background-color: white !important;
            -webkit-print-color-adjust: exact !important; 
            print-color-adjust: exact !important;

            color: black;

        /* Hide UI elements */
        .no-print, nav, aside, button, .gemini-chat-widget, .hide-in-print {

        /* Layout Utilities for Print */
        .break-after-page { break-after: page; page-break-after: always; }
        .break-before-page { break-before: page; page-break-before: always; }
        .break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
        
        /* Ensure containers take full width/height as needed */
        #root, main { 
            width: 100% !important; 
            margin: 0 !important; 
            padding: 0 !important; 
            display: block; 
        }

        /* Professional Borders */
        table, th, td { border-color: #000 !important; }
        .border, .border-2, .border-b, .border-t { border-color: #000 !important; }

        /* Links */
        a { text-decoration: none !important; color: black !important; }
        
        /* Reset Counters */
        body { counter-reset: figCount tabCount; }
      }
    </style>
